<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <!-- Marker for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Project Flow Diagram</text>
  <text x="400" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Embedding created by parth b mistry</text>

  <!-- Node 1: Upload -->
  <g filter="url(#shadow)">
    <rect x="50" y="100" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="50" y="100" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="140" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">1. User Uploads PDF</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <path d="M 230 125 L 290 125" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 2: Extract -->
  <g filter="url(#shadow)">
    <rect x="300" y="100" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="300" y="100" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="390" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">2. PyPDF Extraction</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <path d="M 480 125 L 540 125" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 3: Classifier -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="200" height="50" rx="8" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <rect x="550" y="100" width="200" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="650" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">3. AI Guardrail Classifier</text>
  </g>

  <!-- Arrow 3 -> Reject (Down) -->
  <path d="M 650 150 L 650 200" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">INVALID</text>

  <!-- Node 3a: Reject -->
  <g filter="url(#shadow)">
    <rect x="550" y="210" width="200" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="650" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#991b1b" text-anchor="middle">Reject Document &amp; Alert</text>
  </g>

  <!-- Arrow 3 -> Split (Left-Down) -->
  <path d="M 550 125 L 440 210" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="490" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981">VALID</text>

  <!-- Node 4: Splitter -->
  <g filter="url(#shadow)">
    <rect x="300" y="210" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="300" y="210" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="390" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">4. Recursive Splitter</text>
  </g>

  <!-- Arrow 4 -> 5 (Left) -->
  <path d="M 300 235 L 240 235" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 5: Line Tracker -->
  <g filter="url(#shadow)">
    <rect x="50" y="210" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="50" y="210" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="140" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">5. Line Offset Tracking</text>
  </g>

  <!-- Arrow 5 -> 6 (Down) -->
  <path d="M 140 260 L 140 310" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 6: Embeddings -->
  <g filter="url(#shadow)">
    <rect x="50" y="320" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="50" y="320" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="140" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">6. Vector Embeddings</text>
  </g>

  <!-- Arrow 6 -> 7 -->
  <path d="M 230 345 L 290 345" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 7: ChromaDB -->
  <g filter="url(#shadow)">
    <rect x="300" y="320" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="300" y="320" width="180" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="390" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">7. Store in ChromaDB</text>
  </g>

  <!-- Arrow 7 -> 8 -->
  <path d="M 480 345 L 540 345" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Node 8: Cache Clear -->
  <g filter="url(#shadow)">
    <rect x="550" y="320" width="200" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="550" y="320" width="200" height="6" rx="3" fill="url(#blueGrad)"/>
    <text x="650" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">8. Clear Graph Cache</text>
  </g>

  <!-- Footnote -->
  <rect x="50" y="410" width="700" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" text-anchor="middle" font-weight="500">System architecture ensuring strict medical domain classification guardrails before embedding storage.</text>
</svg>
