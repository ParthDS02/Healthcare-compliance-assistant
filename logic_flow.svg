<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="100%" height="100%">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#115e59" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#6d28d9" />
    </linearGradient>
    <!-- Marker for arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc" rx="16"/>

  <!-- Title -->
  <text x="400" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#0f172a" text-anchor="middle">Logic Flow Diagram</text>
  <text x="400" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Embedding created by parth b mistry</text>

  <!-- Step 1: User Query -->
  <g filter="url(#shadow)">
    <rect x="50" y="100" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="50" y="100" width="180" height="6" rx="3" fill="url(#tealGrad)"/>
    <text x="140" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">1. User Inputs Query</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <path d="M 230 125 L 290 125" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Condense Question -->
  <g filter="url(#shadow)">
    <rect x="300" y="100" width="180" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="300" y="100" width="180" height="6" rx="3" fill="url(#tealGrad)"/>
    <text x="390" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">2. Rephrase Standalone Q</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <path d="M 480 125 L 540 125" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Retrieve -->
  <g filter="url(#shadow)">
    <rect x="550" y="100" width="200" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="550" y="100" width="200" height="6" rx="3" fill="url(#tealGrad)"/>
    <text x="650" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">3. Retrieve from ChromaDB</text>
  </g>

  <!-- Arrow 3 -> 4 (Down) -->
  <path d="M 650 150 L 650 200" fill="none" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Decision Diamond (represented as box with distinct color) -->
  <g filter="url(#shadow)">
    <rect x="540" y="210" width="220" height="50" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
    <text x="650" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Information Found in PDF?</text>
  </g>

  <!-- Arrow 4 -> Fallback (Left) -->
  <path d="M 540 235 L 480 235" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="505" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">NO</text>

  <!-- Fallback Node -->
  <g filter="url(#shadow)">
    <rect x="260" y="210" width="220" height="50" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
    <text x="370" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#991b1b" text-anchor="middle">Output strict fallback text &amp; empty sources</text>
  </g>

  <!-- Arrow 4 -> Yes (Down) -->
  <path d="M 650 260 L 650 310" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#10b981">YES</text>

  <!-- Step 5: Structured Generation -->
  <g filter="url(#shadow)">
    <rect x="540" y="320" width="220" height="55" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="650" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">5. Generate Structured Answer</text>
    <text x="650" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#15803d" text-anchor="middle">&amp; Extract Sources</text>
  </g>

  <!-- Arrow Yes/No outputs merge to memory update -->
  <path d="M 370 260 L 370 420 L 530 420" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 650 375 L 650 420 L 570 420" fill="none" stroke="#4b5563" stroke-width="1.5"/>

  <!-- Step 6: Update Memory -->
  <g filter="url(#shadow)">
    <rect x="250" y="395" width="300" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="250" y="395" width="300" height="6" rx="3" fill="url(#tealGrad)"/>
    <text x="400" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">6. Update Chat History Session State</text>
  </g>

  <!-- Arrow 6 -> 7 (Down) -->
  <path d="M 400 445 L 400 470" fill="none" stroke="#4b5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7: Rerun -->
  <g filter="url(#shadow)">
    <rect x="250" y="480" width="300" height="50" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="250" y="480" width="300" height="6" rx="3" fill="url(#tealGrad)"/>
    <text x="400" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b" text-anchor="middle">7. Rerun Web UI &amp; Display Sources</text>
  </g>

</svg>
